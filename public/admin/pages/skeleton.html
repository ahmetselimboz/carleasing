<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeleton - Admin Panel UI Kit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: { 50: '#f5f0ff', 100: '#ede5ff', 200: '#ddd0ff', 300: '#c4adff', 400: '#8b5cf6', 500: '#6d28d9', 600: '#37008a', 700: '#2e0071', 800: '#26005d', 900: '#1a0040' } } } } }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link href="../css/shared.css" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="flex min-h-screen">
        <aside class="sidebar fixed lg:static w-64 bg-white border-r border-slate-200 min-h-screen">
            <div class="p-6 border-b border-slate-100 flex items-center justify-between gap-2">
                <div><a href="../index.html" class="text-xl font-bold text-slate-800">Admin UI Kit</a><p class="text-slate-500 text-sm mt-1">Komponentler</p></div>
                <button class="dark-mode-toggle p-2 rounded-lg hover:bg-slate-100 text-slate-600 shrink-0" title="Tema değiştir"><i class="ri-moon-line text-xl"></i></button>
            </div>
            <nav class="p-4"><a href="index.html" class="flex items-center gap-3 px-4 py-2 rounded-xl text-[#37008a] bg-[#37008a]/10 font-medium text-sm"><i class="ri-arrow-left-line"></i> Tüm Komponentler</a></nav>
        </aside>
        <main class="flex-1 p-4 lg:p-8">
            <nav class="mb-6 text-sm text-slate-500"><a href="index.html" class="hover:text-[#37008a]">Komponentler</a> / <span class="text-slate-800">Skeleton</span></nav>
            <h1 class="text-2xl font-bold text-slate-800 mb-2">Skeleton</h1>
            <p class="text-slate-600 mb-8">Yükleme placeholder. İçerik yüklenirken gösterilir.</p>

            <div class="space-y-12">
                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Metin Skeleton</h2>
                    <div class="space-y-3 max-w-md">
                        <div class="h-4 bg-slate-200 rounded animate-pulse w-3/4"></div>
                        <div class="h-4 bg-slate-200 rounded animate-pulse w-full"></div>
                        <div class="h-4 bg-slate-200 rounded animate-pulse w-5/6"></div>
                        <div class="h-4 bg-slate-200 rounded animate-pulse w-1/2"></div>
                    </div>
                </section>

                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Kart Skeleton</h2>
                    <div class="flex gap-4">
                        <div class="w-24 h-24 bg-slate-200 rounded-lg animate-pulse"></div>
                        <div class="flex-1 space-y-3">
                            <div class="h-4 bg-slate-200 rounded animate-pulse w-1/3"></div>
                            <div class="h-4 bg-slate-200 rounded animate-pulse w-2/3"></div>
                            <div class="h-4 bg-slate-200 rounded animate-pulse w-1/4"></div>
                        </div>
                    </div>
                </section>

                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Tablo Skeleton</h2>
                    <div class="space-y-4">
                        <div class="flex gap-4">
                            <div class="h-8 bg-slate-200 rounded animate-pulse flex-1"></div>
                            <div class="h-8 bg-slate-200 rounded animate-pulse flex-1"></div>
                            <div class="h-8 bg-slate-200 rounded animate-pulse flex-1"></div>
                        </div>
                        <div class="flex gap-4">
                            <div class="h-10 bg-slate-200 rounded animate-pulse flex-1"></div>
                            <div class="h-10 bg-slate-200 rounded animate-pulse flex-1"></div>
                            <div class="h-10 bg-slate-200 rounded animate-pulse flex-1"></div>
                        </div>
                        <div class="flex gap-4">
                            <div class="h-10 bg-slate-200 rounded animate-pulse flex-1"></div>
                            <div class="h-10 bg-slate-200 rounded animate-pulse flex-1"></div>
                            <div class="h-10 bg-slate-200 rounded animate-pulse flex-1"></div>
                        </div>
                        <div class="flex gap-4">
                            <div class="h-10 bg-slate-200 rounded animate-pulse flex-1"></div>
                            <div class="h-10 bg-slate-200 rounded animate-pulse flex-1"></div>
                            <div class="h-10 bg-slate-200 rounded animate-pulse flex-1"></div>
                        </div>
                    </div>
                </section>

                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Profil Skeleton</h2>
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 bg-slate-200 rounded-full animate-pulse"></div>
                        <div class="space-y-2">
                            <div class="h-4 bg-slate-200 rounded animate-pulse w-32"></div>
                            <div class="h-3 bg-slate-200 rounded animate-pulse w-48"></div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
