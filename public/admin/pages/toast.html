<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast - Admin Panel UI Kit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: { 50: '#f5f0ff', 100: '#ede5ff', 200: '#ddd0ff', 300: '#c4adff', 400: '#8b5cf6', 500: '#6d28d9', 600: '#37008a', 700: '#2e0071', 800: '#26005d', 900: '#1a0040' } } } } }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link href="../css/shared.css" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen" x-data="toastApp()">
    <div id="toast-container" class="fixed top-4 right-4 z-[9999] flex flex-col gap-2 max-w-sm w-full pointer-events-none">
        <template x-for="(t, i) in toasts" :key="t.id">
            <div :class="[
                'pointer-events-auto rounded-xl shadow-lg p-4 flex items-start gap-3',
                t.type === 'success' && 'bg-emerald-50 border border-emerald-200',
                t.type === 'error' && 'bg-red-50 border border-red-200',
                t.type === 'warning' && 'bg-amber-50 border border-amber-200',
                t.type === 'info' && 'bg-[#37008a]/10 border border-[#37008a]/20'
            ]" x-show="t.visible" x-transition>
                <span :class="[
                    'flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold',
                    t.type === 'success' && 'bg-emerald-500 text-white',
                    t.type === 'error' && 'bg-red-500 text-white',
                    t.type === 'warning' && 'bg-amber-500 text-white',
                    t.type === 'info' && 'bg-[#37008a] text-white'
                ]">
                    <i :class="[
                        t.type === 'success' && 'ri-check-line',
                        t.type === 'error' && 'ri-close-line',
                        t.type === 'warning' && 'ri-alert-line',
                        t.type === 'info' && 'ri-information-line'
                    ]"></i>
                </span>
                <div class="flex-1 min-w-0">
                    <p class="font-medium text-slate-900" x-text="t.title"></p>
                    <p class="text-sm text-slate-600 mt-0.5" x-text="t.message"></p>
                </div>
                <button @click="remove(t.id)" class="text-slate-400 hover:text-slate-600"><i class="ri-close-line"></i></button>
            </div>
        </template>
    </div>

    <div class="flex min-h-screen">
        <aside class="sidebar fixed lg:static w-64 bg-white border-r border-slate-200 min-h-screen">
            <div class="p-6 border-b border-slate-100 flex items-center justify-between gap-2">
                <div><a href="../index.html" class="text-xl font-bold text-slate-800">Admin UI Kit</a><p class="text-slate-500 text-sm mt-1">Komponentler</p></div>
                <button class="dark-mode-toggle p-2 rounded-lg hover:bg-slate-100 text-slate-600 shrink-0" title="Tema değiştir"><i class="ri-moon-line text-xl"></i></button>
            </div>
            <nav class="p-4"><a href="index.html" class="flex items-center gap-3 px-4 py-2 rounded-xl text-[#37008a] bg-[#37008a]/10 font-medium text-sm"><i class="ri-arrow-left-line"></i> Tüm Komponentler</a></nav>
        </aside>
        <main class="flex-1 p-4 lg:p-8">
            <nav class="mb-6 text-sm text-slate-500"><a href="index.html" class="hover:text-[#37008a]">Komponentler</a> / <span class="text-slate-800">Toast</span></nav>
            <h1 class="text-2xl font-bold text-slate-800 mb-2">Toast Mesajları</h1>
            <p class="text-slate-600 mb-8">Bildirim mesajları. Sağ üst köşede, otomatik kapanma.</p>

            <div class="space-y-12">
                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Toast Türleri</h2>
                    <div class="flex flex-wrap gap-3">
                        <button @click="show('success', 'Başarılı!', 'İşleminiz tamamlandı.')" class="px-4 py-2 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition font-medium">Success</button>
                        <button @click="show('error', 'Hata!', 'Bir hata oluştu.')" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition font-medium">Error</button>
                        <button @click="show('warning', 'Uyarı!', 'Dikkat edin.')" class="px-4 py-2 bg-amber-500 text-white rounded-lg hover:bg-amber-600 transition font-medium">Warning</button>
                        <button @click="show('info', 'Bilgi', 'Bu bir bilgilendirme.')" class="px-4 py-2 bg-[#37008a] text-white rounded-lg hover:bg-[#4d00a3] transition font-medium">Info</button>
                    </div>
                </section>

                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Özellikler</h2>
                    <ul class="list-disc list-inside text-slate-600 space-y-2">
                        <li>4 tip: success, error, warning, info</li>
                        <li>5 saniye sonra otomatik kapanma</li>
                        <li>Manuel kapatma butonu</li>
                        <li>Çoklu toast desteği</li>
                    </ul>
                </section>
            </div>
        </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script>
        function toastApp() {
            return {
                toasts: [], id: 0,
                show(type, title, message) {
                    const i = ++this.id;
                    this.toasts.push({ id: i, type, title, message, visible: true });
                    setTimeout(() => this.remove(i), 5000);
                },
                remove(id) {
                    const t = this.toasts.find(x => x.id === id);
                    if (t) t.visible = false;
                    setTimeout(() => { this.toasts = this.toasts.filter(x => x.id !== id); }, 300);
                }
            }
        }
    </script>
</body>
</html>
