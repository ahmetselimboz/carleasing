<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arama - Admin Panel UI Kit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: { 50: '#f5f0ff', 100: '#ede5ff', 200: '#ddd0ff', 300: '#c4adff', 400: '#8b5cf6', 500: '#6d28d9', 600: '#37008a', 700: '#2e0071', 800: '#26005d', 900: '#1a0040' } } } } }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link href="../css/shared.css" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen" x-data="searchApp()">
    <div class="flex min-h-screen">
        <aside class="sidebar fixed lg:static w-64 bg-white border-r border-slate-200 min-h-screen">
            <div class="p-6 border-b border-slate-100 flex items-center justify-between gap-2">
                <div><a href="../index.html" class="text-xl font-bold text-slate-800">Admin UI Kit</a><p class="text-slate-500 text-sm mt-1">Komponentler</p></div>
                <button class="dark-mode-toggle p-2 rounded-lg hover:bg-slate-100 text-slate-600 shrink-0" title="Tema değiştir"><i class="ri-moon-line text-xl"></i></button>
            </div>
            <nav class="p-4"><a href="index.html" class="flex items-center gap-3 px-4 py-2 rounded-xl text-[#37008a] bg-[#37008a]/10 font-medium text-sm"><i class="ri-arrow-left-line"></i> Tüm Komponentler</a></nav>
        </aside>
        <main class="flex-1 p-4 lg:p-8">
            <nav class="mb-6 text-sm text-slate-500"><a href="index.html" class="hover:text-[#37008a]">Komponentler</a> / <span class="text-slate-800">Arama</span></nav>
            <h1 class="text-2xl font-bold text-slate-800 mb-2">Arama</h1>
            <p class="text-slate-600 mb-8">Arama input, filtreleme, arama sonuçları dropdown.</p>

            <div class="space-y-12">
                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Temel Arama</h2>
                    <div class="relative max-w-md">
                        <i class="ri-search-line absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                        <input type="text" x-model="query" placeholder="Ara..." class="w-full pl-11 pr-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#37008a] focus:border-[#37008a] transition">
                    </div>
                </section>

                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Arama + Filtre</h2>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <div class="relative flex-1">
                            <i class="ri-search-line absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                            <input type="text" placeholder="Ürün ara..." class="w-full pl-11 pr-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#37008a] transition">
                        </div>
                        <select class="px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#37008a] bg-white">
                            <option>Tüm Kategoriler</option>
                            <option>Elektronik</option>
                            <option>Giyim</option>
                        </select>
                        <button class="px-4 py-2.5 bg-[#37008a] text-white rounded-xl hover:bg-[#4d00a3] transition font-medium">Ara</button>
                    </div>
                </section>

                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Arama Sonuçları Dropdown</h2>
                    <div class="relative max-w-md" x-data="{ open: true }">
                        <div class="relative">
                            <i class="ri-search-line absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                            <input type="text" placeholder="Ara..." class="w-full pl-11 pr-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#37008a] transition">
                        </div>
                        <div class="absolute top-full left-0 right-0 mt-2 bg-white rounded-xl shadow-lg border border-slate-200 py-2 z-10">
                            <p class="px-4 py-2 text-sm text-slate-500">Son aramalar</p>
                            <a href="#" class="block px-4 py-2 hover:bg-slate-50 text-sm">Kablosuz kulaklık</a>
                            <a href="#" class="block px-4 py-2 hover:bg-slate-50 text-sm">Akıllı saat</a>
                            <hr class="my-2 border-slate-100">
                            <p class="px-4 py-2 text-sm text-slate-500">Önerilen</p>
                            <a href="#" class="block px-4 py-2 hover:bg-slate-50 text-sm">Bluetooth hoparlör</a>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script>function searchApp() { return { query: '' } }</script>
</body>
</html>
