<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress - Admin Panel UI Kit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: { 50: '#f5f0ff', 100: '#ede5ff', 200: '#ddd0ff', 300: '#c4adff', 400: '#8b5cf6', 500: '#6d28d9', 600: '#37008a', 700: '#2e0071', 800: '#26005d', 900: '#1a0040' } } } } }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link href="../css/shared.css" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="flex min-h-screen">
        <aside class="sidebar fixed lg:static w-64 bg-white border-r border-slate-200 min-h-screen">
            <div class="p-6 border-b border-slate-100 flex items-center justify-between gap-2">
                <div><a href="../index.html" class="text-xl font-bold text-slate-800">Admin UI Kit</a><p class="text-slate-500 text-sm mt-1">Komponentler</p></div>
                <button class="dark-mode-toggle p-2 rounded-lg hover:bg-slate-100 text-slate-600 shrink-0" title="Tema değiştir"><i class="ri-moon-line text-xl"></i></button>
            </div>
            <nav class="p-4"><a href="index.html" class="flex items-center gap-3 px-4 py-2 rounded-xl text-[#37008a] bg-[#37008a]/10 font-medium text-sm"><i class="ri-arrow-left-line"></i> Tüm Komponentler</a></nav>
        </aside>
        <main class="flex-1 p-4 lg:p-8">
            <nav class="mb-6 text-sm text-slate-500"><a href="index.html" class="hover:text-[#37008a]">Komponentler</a> / <span class="text-slate-800">Progress</span></nav>
            <h1 class="text-2xl font-bold text-slate-800 mb-2">Progress</h1>
            <p class="text-slate-600 mb-8">İlerleme çubukları, spinner, yükleme göstergeleri.</p>

            <div class="space-y-12">
                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">İlerleme Çubukları</h2>
                    <div class="space-y-6">
                        <div>
                            <div class="flex justify-between text-sm mb-2">
                                <span class="font-medium">%25</span>
                                <span class="text-slate-500">25%</span>
                            </div>
                            <div class="h-2 bg-slate-200 rounded-full overflow-hidden">
                                <div class="h-full bg-[#37008a] rounded-full transition-all" style="width: 25%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-sm mb-2">
                                <span class="font-medium">%75</span>
                                <span class="text-slate-500">75%</span>
                            </div>
                            <div class="h-2 bg-slate-200 rounded-full overflow-hidden">
                                <div class="h-full bg-[#37008a] rounded-full transition-all" style="width: 75%"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-sm mb-2">
                                <span class="font-medium">%100</span>
                                <span class="text-emerald-600">Tamamlandı</span>
                            </div>
                            <div class="h-2 bg-slate-200 rounded-full overflow-hidden">
                                <div class="h-full bg-emerald-500 rounded-full" style="width: 100%"></div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Renk Varyantları</h2>
                    <div class="space-y-4">
                        <div class="h-3 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-[#37008a] rounded-full" style="width: 60%"></div></div>
                        <div class="h-3 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-emerald-500 rounded-full" style="width: 80%"></div></div>
                        <div class="h-3 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-amber-500 rounded-full" style="width: 40%"></div></div>
                        <div class="h-3 bg-slate-200 rounded-full overflow-hidden"><div class="h-full bg-red-500 rounded-full" style="width: 20%"></div></div>
                    </div>
                </section>

                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Spinner</h2>
                    <div class="flex flex-wrap gap-8 items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 border-2 border-[#37008a] border-t-transparent rounded-full animate-spin"></div>
                            <span class="text-sm text-slate-600">Küçük</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 border-2 border-[#37008a] border-t-transparent rounded-full animate-spin"></div>
                            <span class="text-sm text-slate-600">Orta</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-16 h-16 border-4 border-[#37008a] border-t-transparent rounded-full animate-spin"></div>
                            <span class="text-sm text-slate-600">Büyük</span>
                        </div>
                    </div>
                </section>

                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Dosya Yükleme Progress</h2>
                    <div class="space-y-4">
                        <div class="flex items-center gap-4">
                            <i class="ri-file-text-line text-2xl text-[#37008a]"></i>
                            <div class="flex-1">
                                <p class="text-sm font-medium text-slate-800">rapor.pdf</p>
                                <div class="h-1.5 bg-slate-200 rounded-full overflow-hidden mt-1">
                                    <div class="h-full bg-[#37008a] rounded-full animate-pulse" style="width: 65%"></div>
                                </div>
                            </div>
                            <span class="text-sm text-slate-500">%65</span>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
