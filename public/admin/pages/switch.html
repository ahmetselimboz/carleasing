<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch - Admin Panel UI Kit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: { 50: '#f5f0ff', 100: '#ede5ff', 200: '#ddd0ff', 300: '#c4adff', 400: '#8b5cf6', 500: '#6d28d9', 600: '#37008a', 700: '#2e0071', 800: '#26005d', 900: '#1a0040' } } } } }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link href="../css/shared.css" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen" x-data="{ on: true, off: false }">
    <div class="flex min-h-screen">
        <aside class="sidebar fixed lg:static w-64 bg-white border-r border-slate-200 min-h-screen">
            <div class="p-6 border-b border-slate-100 flex items-center justify-between gap-2">
                <div><a href="../index.html" class="text-xl font-bold text-slate-800">Admin UI Kit</a><p class="text-slate-500 text-sm mt-1">Komponentler</p></div>
                <button class="dark-mode-toggle p-2 rounded-lg hover:bg-slate-100 text-slate-600 shrink-0" title="Tema değiştir"><i class="ri-moon-line text-xl"></i></button>
            </div>
            <nav class="p-4"><a href="index.html" class="flex items-center gap-3 px-4 py-2 rounded-xl text-[#37008a] bg-[#37008a]/10 font-medium text-sm"><i class="ri-arrow-left-line"></i> Tüm Komponentler</a></nav>
        </aside>
        <main class="flex-1 p-4 lg:p-8">
            <nav class="mb-6 text-sm text-slate-500"><a href="index.html" class="hover:text-[#37008a]">Komponentler</a> / <span class="text-slate-800">Switch</span></nav>
            <h1 class="text-2xl font-bold text-slate-800 mb-2">Switch (Toggle)</h1>
            <p class="text-slate-600 mb-8">Açma/kapama toggle. Ayarlar, bildirim tercihleri.</p>

            <div class="space-y-12">
                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Temel Switch</h2>
                    <div class="flex items-center gap-4">
                        <button @click="on = !on" :class="['relative w-12 h-6 rounded-full transition', on ? 'bg-[#37008a]' : 'bg-slate-200']">
                            <span :class="['absolute top-1 w-4 h-4 rounded-full bg-white transition left-1', on && 'left-7']"></span>
                        </button>
                        <span class="text-sm text-slate-600" x-text="on ? 'Açık' : 'Kapalı'"></span>
                    </div>
                </section>

                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Etiketli Switch</h2>
                    <div class="space-y-4">
                        <label class="flex items-center justify-between cursor-pointer">
                            <span class="text-slate-700">E-posta bildirimleri</span>
                            <button @click="on = !on" :class="['relative w-12 h-6 rounded-full transition', on ? 'bg-[#37008a]' : 'bg-slate-200']">
                                <span :class="['absolute top-1 w-4 h-4 rounded-full bg-white transition left-1', on && 'left-7']"></span>
                            </button>
                        </label>
                        <label class="flex items-center justify-between cursor-pointer">
                            <span class="text-slate-700">Push bildirimleri</span>
                            <button @click="off = !off" :class="['relative w-12 h-6 rounded-full transition', off ? 'bg-[#37008a]' : 'bg-slate-200']">
                                <span :class="['absolute top-1 w-4 h-4 rounded-full bg-white transition left-1', off && 'left-7']"></span>
                            </button>
                        </label>
                        <label class="flex items-center justify-between cursor-pointer">
                            <span class="text-slate-700">İki faktörlü doğrulama</span>
                            <button class="relative w-12 h-6 rounded-full bg-[#37008a]">
                                <span class="absolute top-1 left-7 w-4 h-4 rounded-full bg-white"></span>
                            </button>
                        </label>
                    </div>
                </section>

                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Boyutlar</h2>
                    <div class="flex items-center gap-8">
                        <div class="flex items-center gap-2">
                            <button class="relative w-10 h-5 rounded-full bg-[#37008a]">
                                <span class="absolute top-0.5 left-5 w-4 h-4 rounded-full bg-white"></span>
                            </button>
                            <span class="text-sm text-slate-500">Küçük</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button class="relative w-12 h-6 rounded-full bg-[#37008a]">
                                <span class="absolute top-1 left-7 w-4 h-4 rounded-full bg-white"></span>
                            </button>
                            <span class="text-sm text-slate-500">Orta</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button class="relative w-14 h-7 rounded-full bg-[#37008a]">
                                <span class="absolute top-1 left-8 w-5 h-5 rounded-full bg-white"></span>
                            </button>
                            <span class="text-sm text-slate-500">Büyük</span>
                        </div>
                    </div>
                </section>

                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Disabled</h2>
                    <div class="flex items-center gap-4">
                        <button disabled class="relative w-12 h-6 rounded-full bg-slate-200 opacity-50 cursor-not-allowed">
                            <span class="absolute top-1 left-1 w-4 h-4 rounded-full bg-white"></span>
                        </button>
                        <button disabled class="relative w-12 h-6 rounded-full bg-[#37008a] opacity-50 cursor-not-allowed">
                            <span class="absolute top-1 left-7 w-4 h-4 rounded-full bg-white"></span>
                        </button>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
</body>
</html>
