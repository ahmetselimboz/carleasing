<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayfalama - Admin Panel UI Kit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: { 50: '#f5f0ff', 100: '#ede5ff', 200: '#ddd0ff', 300: '#c4adff', 400: '#8b5cf6', 500: '#6d28d9', 600: '#37008a', 700: '#2e0071', 800: '#26005d', 900: '#1a0040' } } } } }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link href="../css/shared.css" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen" x-data="{ page: 2 }">
    <div class="flex min-h-screen">
        <aside class="sidebar fixed lg:static w-64 bg-white border-r border-slate-200 min-h-screen">
            <div class="p-6 border-b border-slate-100 flex items-center justify-between gap-2">
                <div><a href="../index.html" class="text-xl font-bold text-slate-800">Admin UI Kit</a><p class="text-slate-500 text-sm mt-1">Komponentler</p></div>
                <button class="dark-mode-toggle p-2 rounded-lg hover:bg-slate-100 text-slate-600 shrink-0" title="Tema değiştir"><i class="ri-moon-line text-xl"></i></button>
            </div>
            <nav class="p-4"><a href="index.html" class="flex items-center gap-3 px-4 py-2 rounded-xl text-[#37008a] bg-[#37008a]/10 font-medium text-sm"><i class="ri-arrow-left-line"></i> Tüm Komponentler</a></nav>
        </aside>
        <main class="flex-1 p-4 lg:p-8">
            <nav class="mb-6 text-sm text-slate-500"><a href="index.html" class="hover:text-[#37008a]">Komponentler</a> / <span class="text-slate-800">Sayfalama</span></nav>
            <h1 class="text-2xl font-bold text-slate-800 mb-2">Sayfalama</h1>
            <p class="text-slate-600 mb-8">Pagination. Tablo ve liste sayfalama.</p>

            <div class="space-y-12">
                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Temel Sayfalama</h2>
                    <div class="flex items-center gap-2">
                        <button class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm hover:bg-slate-50 disabled:opacity-50" disabled>Önceki</button>
                        <button :class="['px-3 py-1.5 rounded-lg text-sm', page === 1 ? 'bg-[#37008a] text-white' : 'border border-slate-200 hover:bg-slate-50']">1</button>
                        <button :class="['px-3 py-1.5 rounded-lg text-sm', page === 2 ? 'bg-[#37008a] text-white' : 'border border-slate-200 hover:bg-slate-50']">2</button>
                        <button :class="['px-3 py-1.5 rounded-lg text-sm', page === 3 ? 'bg-[#37008a] text-white' : 'border border-slate-200 hover:bg-slate-50']">3</button>
                        <span class="px-2 text-slate-400">...</span>
                        <button class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm hover:bg-slate-50">10</button>
                        <button class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm hover:bg-slate-50">Sonraki</button>
                    </div>
                </section>

                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Sayfa Bilgisi ile</h2>
                    <div class="flex items-center justify-between flex-wrap gap-4">
                        <p class="text-sm text-slate-500">Toplam 124 kayıt, sayfa 2/13</p>
                        <div class="flex gap-2">
                            <button class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm hover:bg-slate-50 flex items-center gap-1"><i class="ri-arrow-left-s-line"></i> Önceki</button>
                            <button class="px-3 py-1.5 bg-[#37008a] text-white rounded-lg text-sm">2</button>
                            <button class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm hover:bg-slate-50 flex items-center gap-1">Sonraki <i class="ri-arrow-right-s-line"></i></button>
                        </div>
                    </div>
                </section>

                <section class="card bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4">Sayfa Başına Kayıt Seçimi</h2>
                    <div class="flex items-center gap-4 flex-wrap">
                        <span class="text-sm text-slate-600">Sayfa başına:</span>
                        <select class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-[#37008a]">
                            <option>10</option>
                            <option>25</option>
                            <option selected>50</option>
                            <option>100</option>
                        </select>
                        <span class="text-sm text-slate-500">1-50 / 124 kayıt</span>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
</body>
</html>
